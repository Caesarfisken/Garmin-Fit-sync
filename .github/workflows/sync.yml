name: Garmin FIT Sync

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garminconnect dropbox google-api-python-client google-auth google-auth-oauthlib requests

      - name: Write Dropbox token file
        env:
          DROPBOX_TOKEN_JSON: ${{ secrets.DROPBOX_TOKEN_JSON }}
        run: python -c "import os,json; json.dump(json.loads(os.environ['DROPBOX_TOKEN_JSON']), open(os.path.expanduser('~/.dropbox_refresh_token.json'),'w'))"

      - name: Write Google OAuth token file
        env:
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: python -c "import os,json; json.dump(json.loads(os.environ['GOOGLE_OAUTH_TOKEN_JSON']), open(os.path.expanduser('~/.google_oauth_token.json'),'w'))"

      - name: Run sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python garmin_sync_v8.py

      - name: Save sync state
        uses: actions/upload-artifact@v4
        with:
          name: garmin-sync-state
          path: ~/.garmin_sync_state.json
          if-no-files-found: ignore
