name: Garmin FIT Sync

on:
  schedule:
    - cron: '0 7 * * *'   # Runs daily at 07:00 UTC (09:00 Copenhagen time)
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garminconnect dropbox

      - name: Write Dropbox token file
        run: |
          echo '${{ secrets.DROPBOX_TOKEN_JSON }}' > ~/.dropbox_refresh_token.json

      - name: Run sync
        env:
          GARMIN_EMAIL:    ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_to_dropbox_v2.py

      - name: Save sync state
        uses: actions/upload-artifact@v4
        with:
          name: garmin-sync-state
          path: ~/.garmin_sync_state.json
          if-no-files-found: ignore
